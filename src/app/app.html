<div class="app-shell">
  <header class="app-shell__toolbar content-card">
    <span class="app-shell__lang-label">{{ 'language.label' | translate }}</span>
    <div class="app-shell__lang-toggle" role="group" [attr.aria-label]="'language.label' | translate">
      <button
        type="button"
        class="app-shell__lang-btn"
        [class.app-shell__lang-btn--active]="currentLang() === 'uk'"
        (click)="setLang('uk')"
      >
        {{ 'language.uk' | translate }}
      </button>
      <button
        type="button"
        class="app-shell__lang-btn"
        [class.app-shell__lang-btn--active]="currentLang() === 'be'"
        (click)="setLang('be')"
      >
        {{ 'language.be' | translate }}
      </button>
    </div>
  </header>
  <main class="app-shell__main">
    <router-outlet />
  </main>
</div>
