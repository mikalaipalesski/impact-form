name: Build and Deploy
on:
  push:
    branches:
      - main # ці master, залежыць ад вашай асноўнай галінкі

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          npx ng build --configuration production --base-href "https://mikalaipalesski.github.io/impact-form/"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/impact-form/browser # шлях да вашай папки build
          branch: gh-pages